<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Muter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f10;
      color: #e8e6e0;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e1e22;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 22px;
      height: 22px;
      opacity: 0.9;
    }

    .logo-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #e8e6e0;
    }

    .domain-badge {
      font-size: 11px;
      color: #6b6966;
      background: #1a1a1e;
      padding: 3px 8px;
      border-radius: 99px;
      border: 1px solid #252528;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Main mute button ── */
    .main-action {
      padding: 12px 16px;
      border-bottom: 1px solid #1e1e22;
    }

    .mute-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #252528;
      background: #17171a;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      text-align: left;
    }

    .mute-btn:hover {
      background: #1e1e22;
      border-color: #2e2e34;
    }

    .mute-btn:active {
      transform: scale(0.98);
    }

    .mute-btn.is-muted {
      background: #1a1115;
      border-color: #3a1e26;
    }

    .mute-btn.is-muted:hover {
      background: #201318;
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s;
    }

    .btn-icon.sound {
      background: #0e2a1e;
    }

    .btn-icon.muted {
      background: #2a0e18;
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
    }

    .btn-text {
      flex: 1;
    }

    .btn-label {
      font-size: 13px;
      font-weight: 500;
      color: #e8e6e0;
      line-height: 1.3;
    }

    .btn-sub {
      font-size: 11px;
      color: #6b6966;
      margin-top: 1px;
    }

    .btn-shortcut {
      font-size: 10px;
      color: #45433f;
      background: #1a1a1e;
      border: 1px solid #252528;
      border-radius: 4px;
      padding: 2px 5px;
      font-family: monospace;
    }

    /* ── No audio state ── */
    .no-audio {
      padding: 12px 16px;
      text-align: center;
      color: #45433f;
      font-size: 12px;
      line-height: 1.5;
    }

    /* ── Tabs with audio list ── */
    .section-label {
      padding: 10px 16px 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #45433f;
    }

    .tab-list {
      padding: 0 8px 8px;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .tab-item:hover {
      background: #17171a;
    }

    .tab-favicon {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .tab-favicon-fallback {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: #252528;
      flex-shrink: 0;
    }

    .tab-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: 2px;
    }

    .tab-dot.playing {
      background: #22c55e;
    }

    .tab-dot.muted {
      background: #ef4444;
    }

    .tab-title {
      flex: 1;
      font-size: 12px;
      color: #a8a5a0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tab-toggle {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #252528;
      background: transparent;
      color: #6b6966;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.1s;
      flex-shrink: 0;
    }

    .tab-toggle:hover {
      background: #1e1e22;
      color: #a8a5a0;
      border-color: #2e2e34;
    }

    .tab-toggle.unmute {
      color: #ef4444;
      border-color: #3a1e26;
    }

    .tab-toggle.unmute:hover {
      background: #1a1115;
      color: #f87171;
    }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px 10px;
      border-top: 1px solid #1e1e22;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-hint {
      font-size: 10px;
      color: #45433f;
    }

    .mute-all-btn {
      font-size: 10px;
      color: #6b6966;
      background: transparent;
      border: 1px solid #252528;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .mute-all-btn:hover {
      background: #17171a;
      color: #a8a5a0;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: #1e1e22;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 8H7L11 4V18L7 14H4V8Z" fill="#22c55e" stroke="#22c55e" stroke-width="0.5" stroke-linejoin="round"/>
        <path id="wave1" d="M14 7.5C15.5 9 15.5 13 14 14.5" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path id="wave2" d="M16.5 5C19 7.5 19 14.5 16.5 17" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
        <path id="mute-x" d="M13.5 8.5L18 13M18 8.5L13.5 13" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" fill="none" style="display:none"/>
      </svg>
      <span class="logo-name">Tab Muter</span>
    </div>
    <span class="domain-badge" id="domain-badge">—</span>
  </div>

  <div class="main-action" id="main-action">
    <button class="mute-btn" id="mute-btn" onclick="toggleCurrentTab()">
      <div class="btn-icon sound" id="btn-icon">
        <svg id="btn-svg-sound" viewBox="0 0 16 16" fill="none">
          <path d="M2 6H5L8 3V13L5 10H2V6Z" fill="#22c55e"/>
          <path d="M10 5.5C11 6.5 11 9.5 10 10.5" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M12 3.5C14 5.5 14 10.5 12 12.5" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
        </svg>
        <svg id="btn-svg-muted" viewBox="0 0 16 16" fill="none" style="display:none">
          <path d="M2 6H5L8 3V13L5 10H2V6Z" fill="#ef4444"/>
          <path d="M10 6L14 10M14 6L10 10" stroke="#ef4444" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="btn-text">
        <div class="btn-label" id="btn-label">Mute this tab</div>
        <div class="btn-sub" id="btn-sub">Tab is playing audio</div>
      </div>
    </button>
  </div>

  <div id="audio-tabs-section">
    <div class="section-label">All tabs with audio</div>
    <div class="tab-list" id="tab-list">
    </div>
  </div>

  <div class="footer">
    <span class="footer-hint" id="footer-hint">No audio detected</span>
    <button class="mute-all-btn" id="mute-all-btn" onclick="muteAll()">Mute all</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
